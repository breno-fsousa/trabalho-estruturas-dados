<!DOCTYPE html>
<html>
<head>
    <title>Estruturas de Dados</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e1e2f, #2c2c54);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .box {
            background: #2f3640;
            padding: 20px;
            margin: 20px;
            width: 300px;
            border-radius: 12px;
        }

        input {
            padding: 5px;
            margin-top: 5px;
            width: 70%;
        }

        button {
            padding: 6px 10px;
            margin-top: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .add-btn {
            background-color: #00a8ff;
            color: white;
        }

        .remove-btn {
            background-color: #e84118;
            color: white;
        }

        .item {
            background: #353b48;
            padding: 5px;
            margin: 5px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<h1>Representação Visual de Estruturas de Dados</h1>

<div class="container">

    
    <div class="box">
        <h2>Lista</h2>
        <p>Exemplo: Lista de contatos</p>

        <form method="POST" action="/lista/add">
            <input name="valor" placeholder="Adicionar contato">
            <button class="add-btn" type="submit">Adicionar</button>
        </form>

        {% for item in lista %}
            <div class="item">
                {{ item }}
                <a href="/lista/remove/{{ loop.index0 }}">
                    <button class="remove-btn">X</button>
                </a>
            </div>
        {% endfor %}
    </div>

    
    <div class="box">
        <h2>Fila </h2>
        <p>Exemplo: Fila de banco</p>

        <form method="POST" action="/fila/add">
            <input name="valor" placeholder="Entrar na fila">
            <button class="add-btn" type="submit">Entrar</button>
        </form>

        <a href="/fila/remove">
            <button class="remove-btn">Atender</button>
        </a>

        {% for item in fila %}
            <div class="item">{{ item }}</div>
        {% endfor %}
    </div>

    
    <div class="box">
        <h2>Pilha </h2>
        <p>Exemplo: Histórico de navegador</p>

        <form method="POST" action="/pilha/add">
            <input name="valor" placeholder="Acessar site">
            <button class="add-btn" type="submit">Empilhar</button>
        </form>

        <a href="/pilha/remove">
            <button class="remove-btn">Voltar</button>
        </a>

        {% for item in pilha %}
            <div class="item">{{ item }}</div>
        {% endfor %}
    </div>

</div>

</body>
</html>
